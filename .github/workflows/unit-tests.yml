name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  crater-web-tests:
    name: Crater Web Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core package for web tests
        run: bun --filter @crater/core run build

      - name: Install Playwright browsers for Vitest
        run: bun --filter crater-web run playwright:install

      - name: Run vitest suite
        run: bun --filter crater-web run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/crater-web/coverage/lcov.info
          flags: crater-web
          fail_ci_if_error: true

  crater-ext-tests:
    name: Crater VS Code Extension Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core package for extension
        run: bun --filter @crater/core run build

      - name: Run VS Code tests
        run: xvfb-run -a bun --filter crater-ext run test
        env:
          CI: true

  crater-image-editor-tests:
    name: Crater Image Editor Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run vitest suite
        run: bun --filter crater-image-editor run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/crater-image-editor/coverage/lcov.info
          flags: crater-image-editor
          fail_ci_if_error: true

  core-tests:
    name: Core Package Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run vitest suite
        run: bun --filter @crater/core run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/core/coverage/lcov.info
          flags: core
          fail_ci_if_error: true
