name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  crater-web-tests:
    name: Crater Web Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core package for web tests
        run: bun run --filter @crater/core build

      - name: Install Playwright browsers for Vitest
        run: bun run --filter crater-web playwright:install

      - name: Run vitest suite
        run: bun run --filter crater-web test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/crater-web/coverage/lcov.info
          flags: crater-web
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  crater-ext-tests:
    name: Crater VS Code Extension Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core package for extension
        run: bun run --filter @crater/core build

      - name: Build extension and compile tests
        run: |
          bun run --filter crater-ext build
          bun run --filter crater-ext compile-tests

      - name: Run VS Code tests
        run: xvfb-run -a bun run --filter crater-ext test:vscode
        env:
          CI: true

      - name: Run unit tests with coverage
        run: bun run --filter crater-ext test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/crater-ext/coverage/lcov.info
          flags: crater-ext
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  crater-image-editor-tests:
    name: Crater Image Editor Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run vitest suite
        run: bun run --filter crater-image-editor test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/crater-image-editor/coverage/lcov.info
          flags: crater-image-editor
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  core-tests:
    name: Core Package Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.0

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run vitest suite
        run: bun run --filter @crater/core test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/core/coverage/lcov.info
          flags: core
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
